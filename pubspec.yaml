name: Mushaf_app
description: تطبيق مصحف - قرآن وأذكار وصلاة
version: 1.0.1+2
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png" # لازم ترفع صورة بهذا المسار
  min_sdk_android: 21

flutter:
  uses-material-design: true
