name: mushaf_app
description: Mushaf Islamic Application
version: 1.0.1+2
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  geolocator: ^10.1.1       # ضفنا هاي عشان تحديد الموقع
  shared_preferences: ^2.2.2 # ضفنا هاي عشان حفظ البيانات
  intl: ^0.18.1             # ضفنا هاي عشان التواريخ
  audio_session: ^0.1.18    # ضفنا هاي عشان الصوت

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
