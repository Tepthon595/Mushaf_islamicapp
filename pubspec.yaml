name: mushaf_app
description: Mushaf Islamic Application
version: 1.0.1+2
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  geolocator: ^10.1.1
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  audio_session: ^0.1.18
  provider: ^6.1.1       # هذه المكتبة اللي كانت ناقصة في الصورة الأخيرة
  path_provider: ^2.1.2  # احتياطاً لأن معظم تطبيقات المصحف بتحتاجها
  cached_network_image: ^3.3.1 # احتياطاً للصور

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
