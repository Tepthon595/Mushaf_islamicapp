name: quran_app
description: A complete Islamic Quran application converted from HTML.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  just_audio: ^0.9.36        # لتشغيل الصوت والتكرار
  http: ^1.1.0               # لجلب أوقات الصلاة والآيات
  geolocator: ^10.1.0        # لتحديد الموقع للآذان
  shared_preferences: ^2.2.2 # لحفظ الإعدادات والتقدم
  intl: ^0.18.1              # للتواريخ واللغات
  provider: ^6.1.1           # لإدارة حالة الثيم واللغة

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700

